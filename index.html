<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TorMemoryCards</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 40px; text-align: center; background-color: #f4f7f6; position: relative; }
        
        .lang-switcher { position: absolute; top: 10px; right: 10px; }
        select { padding: 5px; border-radius: 5px; border: 1px solid #ccc; background: white; cursor: pointer; }

        .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 20px; }
        .logo { width: 120px; height: auto; margin-bottom: 20px; border-radius: 20%; }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        p { font-size: 1.1rem; color: #555; margin-bottom: 20px; min-height: 100px; }
        
        .footer { margin-top: 50px; font-size: 0.9rem; color: #888; }
        .footer a { color: #3498db; text-decoration: none; margin: 0 10px; }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="lang-switcher">
        <select id="langSelect" onchange="changeLang(this.value)">
            <option value="en">English</option>
            <option value="ru">Русский</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="it">Italiano</option>
            <option value="pt">Português</option>
            <option value="tr">Türkçe</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="zh">中文</option>
        </select>
    </div>

    <div class="container">
        <img src="logo_center.png" alt="TorMemoryCards Logo" class="logo">
        <h1 id="title">TorMemoryCards</h1>
        <p id="description">Loading...</p>
    </div>

    <div class="footer">
        <p>&copy; 2026 TorMemoryCards</p>
        <p>
            <a href="/app-ads.txt">app-ads.txt</a> | 
            <a href="https://stemax.github.io/TorMemoryCards-Privacy-Policy/">Privacy Policy</a>
        </p>
    </div>

    <script>
        const supportedLangs = ['ru', 'en', 'de', 'es', 'fr', 'it', 'ja', 'ko', 'pt', 'tr', 'zh'];
        
        let currentLang = navigator.language.split('-')[0];
        if (!supportedLangs.includes(currentLang)) currentLang = 'en';

        document.getElementById('langSelect').value = currentLang;

        function loadContent(lang) {
            document.getElementById('description').innerText = "Loading...";
            fetch(`./locales/${lang}.json`)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('description').innerText = data.description || "Enjoy the game!";
                    if(data.title) document.getElementById('title').innerText = data.title;
                })
                .catch(err => {
                    console.error("Error:", err);
                    document.getElementById('description').innerText = "Improve your memory and concentration with TorMemoryCards!";
                });
        }

        function changeLang(newLang) {
            loadContent(newLang);
        }

        loadContent(currentLang);
    </script>
</body>
</html>
