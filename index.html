<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TorMemoryCards</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 40px; text-align: center; background-color: #f4f7f6; }
        .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        p { font-size: 1.1rem; color: #555; margin-bottom: 20px; }
        .footer { margin-top: 50px; font-size: 0.9rem; color: #888; }
        a { color: #3498db; text-decoration: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="title">TorMemoryCards</h1>
        <p id="description">Loading...</p>
    </div>

    <div class="footer">
        <p>&copy; 2026 TorMemoryCards | <a href="/app-ads.txt">app-ads.txt</a></p>
    </div>

    <script>
        const supportedLangs = ['ru', 'en', 'de', 'es', 'fr', 'it', 'ja', 'ko', 'pt', 'tr', 'zh'];

        let lang = navigator.language.split('-')[0]; 
        if (!supportedLangs.includes(lang)) lang = 'en'; 

        fetch(`./locales/${lang}.json`)
            .then(response => response.json())
            .then(data => {
                document.getElementById('description').innerText = data.description || data.app_description || "Enjoy the game!";
                if(data.title) document.getElementById('title').innerText = data.title;
            })
            .catch(err => {
                console.error("Error loading translation", err);
                document.getElementById('description').innerText = "Improve your memory and concentration with TorMemoryCards!";
            });
    </script>
</body>
</html>
